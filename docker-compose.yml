services:
  web:
    build: .
    container_name: social_media_api
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - db_sm
      - redis

  redis:
    image: redis:7
    container_name: redis_sm
    ports:
      - "6379:6379"

  db_sm:
    image: postgres:14-alpine
    container_name: postgres_db_sm
    volumes:
      - postgres_db:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}

  celery:
    build: .
    container_name: celery_worker
    command: celery -A social_media_api worker --loglevel=info --pool=solo
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - db_sm
    env_file:
      - .env

volumes:
  postgres_db:
